name: Build RoadLog APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the build files
        uses: actions/checkout@v4

      - name: Create config files
        run: |
          echo '{"name":"roadlog","version":"1.0.0","private":true,"dependencies":{"@capacitor/android":"^6.0.0","@capacitor/core":"^6.0.0","@capacitor/share":"^6.0.0","@capacitor/filesystem":"^6.0.0","@capacitor-community/background-geolocation":"^1.2.0","@capacitor-community/speech-recognition":"^6.0.0"},"devDependencies":{"@capacitor/cli":"^6.0.0"}}' > package.json
          echo '{"appId":"com.lourens.roadlog","appName":"RoadLog","webDir":"www"}' > capacitor.config.json

      - name: Build the app folder
        run: |
          mkdir -p www
          echo '' | base64 -d > www/native-bridge.js
          echo '' | base64 -d > www/copy-feature.js
          echo '' | base64 -d > www/pip-view.js
          echo '' | base64 -d > www/place-search.js
          echo '' | base64 -d > www/map-tweaks.js
          echo '' | base64 -d > www/overtime.js
          curl -fsSL https://raw.githubusercontent.com/lourensoberholzer45-ship-it/roadlog-app/main/index.html -o www/index.html
          sed -i 's#<meta charset="UTF-8">#<meta charset="UTF-8">\n<script src="native-bridge.js"></script>\n<script src="copy-feature.js"></script>\n<script src="pip-view.js"></script>\n<script src="place-search.js"></script>\n<script src="map-tweaks.js"></script>\n<script src="overtime.js"></script>#' www/index.html
          sed -i 's#exportDayPDF(${calYear},${calMonth},${day})">Share PDF#copyDayText(${calYear},${calMonth},${day})">Copy#' www/index.html
          sed -i 's#exportMonthPDF(${calYear},${calMonth})#copyMonthText(${calYear},${calMonth})#' www/index.html
          sed -i 's#📄 Export ${MONTH_NAMES\[calMonth\]} logbook PDF#📋 Copy ${MONTH_NAMES[calMonth]} logbook#' www/index.html
          sed -i 's#exportTripPDF(\([^)]*\))">Share PDF#copyTripText(\1)">Copy#' www/index.html
          sed -i 's#onclick="exportPlannerPDF()"#onclick="copyPlannerText()"#' www/index.html
          sed -i 's#📄 Export route PDF#📋 Copy route#' www/index.html
          sed -i 's/if(pausedSec >= 60){/if(false){/' www/index.html
          sed -i "s#if(which==='history') renderCalendar();#if(which==='history') showLogbookView('calendar');#" www/index.html
          sed -i "s#v!=='calendar' && view!=='calendar' ? true : view!==v#view!=='calendar'#" www/index.html
          sed -i 's/const MIN_ACCURACY_M = 60;/const MIN_ACCURACY_M = 90;/' www/index.html
          sed -i 's/if(distKm < 2){ trip.distanceKm += distKm; }/if(distKm < 10){ trip.distanceKm += distKm; }/' www/index.html
          sed -i 's#<button class="start-sheet-go"#<div style="font-size:12px;color:var(--amber);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;">Reason for trip?</div><div class="start-sheet-row" style="margin-bottom:14px;"><input class="start-sheet-input" id="startReasonInput" placeholder="e.g. Deliver panels at Civic" style="width:100%;"></div>\n      <button class="start-sheet-go"#' www/index.html
          sed -i 's#  trip = { id: uid(), startTime: Date.now(), endTime:null, distanceKm:0, stops:\[\], vehicleName: currentVehicleName() };#  var _ri=document.getElementById("startReasonInput"); var _reason=_ri?_ri.value.trim():""; if(_ri)_ri.value="";\n  trip = { id: uid(), startTime: Date.now(), endTime:null, distanceKm:0, stops:[], vehicleName: currentVehicleName(), reason: _reason };#' www/index.html
          sed -i "s#elapsedTimer = setInterval(updateElapsed, 1000);#elapsedTimer = setInterval(updateElapsed, 1000);\n  switchTab('map');#" www/index.html
          sed -i 's@</head>@<style>.mic-btn{display:none!important;}#langToggleBtn{display:none!important;}#addStopBtn{display:none!important;}.start-sheet-skip{display:none!important;}</style></head>@' www/index.html

          echo "=== Safety check: did every patch actually land? ==="
          test -s www/index.html || { echo "STOP: index.html came back empty from the repo."; exit 1; }
          PATCH_FAIL=0
          must(){ if grep -qF "$2" www/index.html; then echo "  ok    - $1"; else echo "  FAIL  - $1"; PATCH_FAIL=1; fi; }
          opt(){  if grep -qF "$2" www/index.html; then echo "  ok    - $1"; else echo "  warn  - $1 (cosmetic, not blocking)"; fi; }
          must "native scripts injected (GPS / share / copy / place-search)" 'src="place-search.js"'
          must "copy day wired to button"            'copyDayText('
          must "copy month wired to button"          'copyMonthText('
          must "reason box shown at trip start"      'id="startReasonInput"'
          must "reason saved onto the trip"          'reason: _reason'
          must "GPS accuracy filter = 90m"           'MIN_ACCURACY_M = 90'
          must "highway jump filter = 10km"          'if(distKm < 10){'
          opt  "copy trip wired to button"           'copyTripText('
          opt  "copy planner wired to button"        'copyPlannerText()'
          opt  "auto-switch to map on start"         "switchTab('map')"
          opt  "add-stop hidden / start-trip full width"  'src="map-tweaks.js"'
          opt  "overtime button + report line"             'src="overtime.js"'
          if [ "$PATCH_FAIL" = "1" ]; then
            echo "------------------------------------------------------------"
            echo "STOP: a patch marked FAIL above did not apply."
            echo "The index.html in your roadlog-app repo must have changed,"
            echo "so that feature would be SILENTLY missing from the APK."
            echo "Build halted on purpose so you don't ship a broken app."
            echo "Tell Claude which line said FAIL and it'll re-point the patch."
            echo "------------------------------------------------------------"
            exit 1
          fi
          echo "All critical patches verified - safe to build."

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets and plugins
        run: npx cap sync android

      - name: Add location permissions and auto small-window
        run: |
          sed -i 's#<application#<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/><uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/><uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION"/><uses-permission android:name="android.permission.FOREGROUND_SERVICE"/><uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION"/><uses-permission android:name="android.permission.RECORD_AUDIO"/><queries><intent><action android:name="android.speech.RecognitionService"/></intent></queries><application#' android/app/src/main/AndroidManifest.xml
          sed -i 's#android:name=".MainActivity"#android:name=".MainActivity"\n            android:supportsPictureInPicture="true"#' android/app/src/main/AndroidManifest.xml
          echo '' | base64 -d > android/app/src/main/java/com/lourens/roadlog/MainActivity.java
          echo "--- MainActivity after patch ---"
          cat android/app/src/main/java/com/lourens/roadlog/MainActivity.java
          echo "--- manifest PiP attr present? ---"
          grep -c supportsPictureInPicture android/app/src/main/AndroidManifest.xml

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: RoadLog-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error 
