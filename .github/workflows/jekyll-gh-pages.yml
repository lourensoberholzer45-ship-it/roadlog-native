name: Build RoadLog APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the build files
        uses: actions/checkout@v4

      - name: Create config files
        run: |
          echo '{"name":"roadlog","version":"1.0.0","private":true,"dependencies":{"@capacitor/android":"^6.0.0","@capacitor/core":"^6.0.0","@capacitor/share":"^6.0.0","@capacitor/filesystem":"^6.0.0","@capacitor-community/background-geolocation":"^1.2.0"},"devDependencies":{"@capacitor/cli":"^6.0.0"}}' > package.json
          echo '{"appId":"com.lourens.roadlog","appName":"RoadLog","webDir":"www"}' > capacitor.config.json

      - name: Build the app folder
        run: |
          mkdir -p www
          echo 'Б' | base64 -d > www/native-bridge.js
          curl -fsSL https://raw.githubusercontent.com/lourensoberholzer45-ship-it/roadlog-app/main/index.html -o www/index.html
          sed -i 's#<meta charset="UTF-8">#<meta charset="UTF-8">\n<script src="native-bridge.js"></script>#' www/index.html
          sed -i 's/if(pausedSec >= 60){/if(false){/' www/index.html
          sed -i "s#if(which==='history') renderCalendar();#if(which==='history') showLogbookView('calendar');#" www/index.html
          sed -i "s#v!=='calendar' && view!=='calendar' ? true : view!==v#view!=='calendar'#" www/index.html

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets and plugins
        run: npx cap sync android

      - name: Add location permissions
        run: |
          sed -i 's#<application#<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/><uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/><uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION"/><uses-permission android:name="android.permission.FOREGROUND_SERVICE"/><uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION"/><application#' android/app/src/main/AndroidManifest.xml

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: RoadLog-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
